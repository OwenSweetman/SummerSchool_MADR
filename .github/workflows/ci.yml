name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x, 18.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile-tests

      - name: Run tests
        run: npx jest --ci

      - name: Build extension (webpack)
        run: npm run compile

      - name: Lint
        run: npm run lint
        continue-on-error: true # remove once lint is clean across the repo
